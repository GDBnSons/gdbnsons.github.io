<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="robots" content="noindex, nofollow"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="GDB & Sons"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon.png"/>
  <title>GDB & Sons</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#07080D;overflow-x:hidden}
    #root{min-height:100vh}

    #loader{
      position:fixed;inset:0;background:#07080D;
      display:flex;align-items:center;justify-content:center;
      z-index:9999;transition:opacity .5s ease;
    }

    .btc-symbol{
      font-size:72px;
      color:#1a0e00;
      animation:btcLight 2.6s ease-in-out forwards;
      filter:drop-shadow(0 0 0px #F7931A);
      user-select:none;
    }

    @keyframes btcLight{
      0%  {color:#1a0e00; filter:drop-shadow(0 0 0px   #F7931A)}
      25% {color:#3d1e00; filter:drop-shadow(0 0 2px   #F7931A)}
      55% {color:#7a3800; filter:drop-shadow(0 0 8px   #F7931A)}
      80% {color:#c96000; filter:drop-shadow(0 0 18px  #F7931A)}
      100%{color:#F7931A; filter:drop-shadow(0 0 28px  #F7931A)}
    }
  </style>
</head>
<body>
  <div id="loader">
    <div class="btc-symbol">₿</div>
  </div>

  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-presets="react" src="app.jsx?v=19.91"></script>
  <script>
    const obs=new MutationObserver(()=>{
      if(document.querySelector('#root > div')){
        const l=document.getElementById('loader');
        l.style.opacity='0';
        setTimeout(()=>l.style.display='none',500);
        obs.disconnect();
      }
    });
    obs.observe(document.getElementById('root'),{childList:true});
  </script>
</body>
</html>
