<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="robots" content="noindex, nofollow"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="GDB & Sons"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon.png"/>
  <title>GDB & Sons</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #07080D; overflow-x: hidden; }
    #root { min-height: 100vh; }
    /* Spinner de chargement */
    #loader {
      position: fixed; inset: 0;
      background: #07080D;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 9999;
    }
    #loader span { font-size: 48px; }
    #loader p { color: #F7931A; font-family: system-ui; font-size: 16px; font-weight: 800; }
    #loader small { color: #6B7280; font-family: system-ui; font-size: 12px; }
  </style>
</head>
<body>
  <div id="loader">
    <span>₿</span>
    <p>GDB & Sons</p>
    <small>Chargement...</small>
  </div>
  <div id="root"></div>

  <!-- React + Babel via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- App -->
  <script type="text/babel" data-presets="react" src="app.jsx"></script>

  <script>
    // Cache busting + hide loader once app mounts
    const observer = new MutationObserver(() => {
      if (document.querySelector('#root > div')) {
        document.getElementById('loader').style.display = 'none';
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById('root'), { childList: true });
  </script>
</body>
</html>
