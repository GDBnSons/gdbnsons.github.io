<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="robots" content="noindex, nofollow"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="GDB & Sons"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon.png"/>
  <title>GDB & Sons</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#07080D;overflow-x:hidden}
    #root{min-height:100vh}
    #loader{position:fixed;inset:0;background:#07080D;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999;transition:opacity .4s}
    #loader span{font-size:48px}
    #loader p{color:#F7931A;font-family:system-ui;font-size:16px;font-weight:800}
    #loader small{color:#6B7280;font-family:system-ui;font-size:12px}
  </style>
</head>
<body>
  <div id="loader"><span>₿</span><p>GDB & Sons</p><small>Chargement...</small></div>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-presets="react" src="app.jsx?v=16.3"></script>
  <script>
    const obs=new MutationObserver(()=>{
      if(document.querySelector('#root > div')){
        const l=document.getElementById('loader');
        l.style.opacity='0';
        setTimeout(()=>l.style.display='none',400);
        obs.disconnect();
      }
    });
    obs.observe(document.getElementById('root'),{childList:true});
  </script>
</body>
</html>
